server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml application/wasm;

    # Assets com hash no nome: cache longo e imutável
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # OpenCV (arquivo fixo e grande): baixa uma vez e fica em cache (offline).
    # Fica fora do precache do SW e o importScripts do worker pode não passar
    # pelo service worker, então o cache HTTP imutável é o que garante isso.
    location /opencv/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Modelos do OCR (PaddleOCR) e runtime WASM do ONNX: mesmos motivos acima.
    # O .mjs precisa de MIME de JavaScript (import() de módulo exige).
    location /ocr/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }
    location /ort/ {
        types {
            application/javascript mjs;
            application/wasm wasm;
        }
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Modelos de relatório (xlsx): revalidar (o financeiro pode atualizar o modelo)
    location /templates/ {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    # Service worker e manifest: sempre revalidar (atualizações da PWA)
    location = /sw.js {
        add_header Cache-Control "no-cache";
    }
    location = /registerSW.js {
        add_header Cache-Control "no-cache";
    }
    location = /manifest.webmanifest {
        default_type application/manifest+json;
        add_header Cache-Control "no-cache";
    }

    # SPA: qualquer rota cai no index.html (React Router cuida do resto)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
